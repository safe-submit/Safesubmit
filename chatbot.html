<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SafeSubmit — Sandbox</title>
  <link rel="stylesheet" href="./style.css?v=1.3" />
</head>
<body>
<!-- UPDATED FIXED NAVIGATION BAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand-link">
        <img src="brand-icon-img.png" alt="SafeSubmit logo" class="nav-logo-img" style="height:36px;width:auto;">
        <div class="nav-title">SafeSubmit</div>
      </a>

      <!-- Hamburger Menu Toggle Button for Mobile Screens -->
      <button class="mobile-menu-toggle" aria-label="Toggle navigation menu" id="mobile-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- The Navigation Links Panel (Acts as desktop header row OR mobile sidebar) -->
      <div class="nav-menu" id="nav-menu-panel">
        <a href="integrations.html">Custom Integrations</a>
        <a href="core-engines.html">Core Engines</a>
        <a href="about.html">Our Team</a>
        <a href="chatbot.html" class="nav-cta">Launch Chatbot</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="app-workspace-section">
      <div class="section-heading">
        <h2>Live Sandbox — SafeSubmit</h2>
        <p>Interact with the SafeSubmit chatbot to run ScanCore checks on text, files or images.</p>
      </div>

      <!-- React app will mount here -->
      <div id="root" class="root-container"></div>
    </section>
  </main>

  <footer class="platform-footer">
    <p>&copy; 2026 SafeSubmit Project Portfolio Running on Botpress ScanCore Engine Node Link.</p>
    <div class="app-socials footer-socials">
      <a href="#" class="cta-button secondary social-button" aria-label="Instagram">
        <img src="instagram.png" alt="Instagram" class="social-icon">
      </a>
      <a href="https://t.me/safesubmit_bot" class="cta-button secondary social-button" aria-label="Telegram" target="_blank" rel="noopener noreferrer">
        <img src="Telegram.png" alt="Telegram" class="social-icon">
      </a>
      <a href="https://discord.gg/msWpjbavFX" class="cta-button secondary social-button" aria-label="Discord" target="_blank" rel="noopener noreferrer">
        <img src="Discord.png" alt="Discord" class="social-icon">
      </a>
    </div>
  </footer>

  <!-- React & ReactDOM (UMD builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Mount app (user's app.js expects React and ReactDOM globals) -->
  <script type="module" src="./app.js"></script>

  <script>document.getElementById('year-sbx').textContent = new Date().getFullYear();</script>
  <!-- SMALL DYN-JS INTERCEPTOR: Place this right above the closing </body> tag -->
  <script>
    const mobileToggle = document.getElementById('mobile-toggle');
    const navMenuPanel = document.getElementById('nav-menu-panel');

    if (mobileToggle && navMenuPanel) {
      mobileToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileToggle.classList.toggle('active');
        navMenuPanel.classList.toggle('active');
      });

      // Safely close the sidebar if clicking anywhere outside the menu on mobile layout viewports
      document.addEventListener('click', (e) => {
        if (!navMenuPanel.contains(e.target) && !mobileToggle.contains(e.target)) {
          mobileToggle.classList.remove('active');
          navMenuPanel.classList.remove('active');
        }
      });
    }
  </script>
</body>
</html>
